<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            height: 100px;
            width: 100px;
            display: inline-block;
            
        }
        #one{
            background-color: beige;
            border-radius: 50%;
        }
        #two{
            background-color: aquamarine;
           position: static;
            /*position: relative;*/
         /*position: absolute;*/
            top: 100px;
            left:100px;
            bottom:100px;
            border-radius: 90%;
        }
        #three{
            background-color: darkgray;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="one">heyy</div>
    <div id="two">yooo</div>
     <div id="three">hoho</div>
</body>
</html>
